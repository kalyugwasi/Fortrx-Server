services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      fortrx:
        condition: service_healthy
    env_file:
      - ${RUNTIME_ENV_FILE:-.env.runtime}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  duckdns:
    image: alpine:3.20
    restart: unless-stopped
    env_file:
      - ${RUNTIME_ENV_FILE:-.env.runtime}
    command: >
      sh -c "apk add --no-cache curl >/dev/null &&
      while true; do
        curl -fsS \"https://www.duckdns.org/update?domains=$${DUCKDNS_DOMAIN}&token=$${DUCKDNS_TOKEN}&ip=\";
        sleep 300;
      done"

  fortrx:
    image: ${IMAGE_REF:?Set IMAGE_REF}
    env_file:
      - ${RUNTIME_ENV_FILE:-.env.runtime}

volumes:
  caddy_data:
  caddy_config:
